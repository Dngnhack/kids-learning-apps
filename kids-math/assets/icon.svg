<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="DL Math">
  <!-- Original clean-room icon: a friendly math tile (+ and −). No third-party/copyrighted art. -->
  <rect width="512" height="512" rx="112" fill="#1d4ed8"/>
  <rect x="56" y="56" width="400" height="400" rx="80" fill="#eef4ff"/>
  <!-- plus -->
  <rect x="150" y="120" width="36" height="120" rx="12" fill="#16a34a"/>
  <rect x="108" y="162" width="120" height="36" rx="12" fill="#16a34a"/>
  <!-- minus -->
  <rect x="290" y="162" width="120" height="36" rx="12" fill="#f59e0b"/>
  <text x="256" y="404" font-family="system-ui, sans-serif" font-size="150" font-weight="900"
        text-anchor="middle" fill="#1e3a8a">+−</text>
</svg>
